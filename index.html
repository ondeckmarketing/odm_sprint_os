body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--navy);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
.mono{font-family:'DM Mono',monospace}
.nav{position:sticky;top:0;z-index:50;background:var(--navy);border-bottom:3px solid var(--orange);background-image:radial-gradient(circle at 12% 0,rgba(232,97,26,.18),transparent 38%);}

.tab{font-family:'DM Sans';font-weight:600;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--slate);background:none;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;transition:.18s}
.tab:hover{color:#fff;background:rgba(255,255,255,.07)}.tab.on{color:var(--orange);background:rgba(232,97,26,.13)}
.status{font-family:'DM Mono';font-size:11px;color:var(--slate);display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}
.dot{width:8px;height:8px;border-radius:50%}.dot.g{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.a{background:var(--yellow)}
.wrap{max-width:1180px;margin:0 auto;padding:32px 24px 80px}
.page{display:none;animation:fade .3s ease}.page.on{display:block}

.shead{background:var(--navy);border-radius:12px;padding:26px 28px;color:#fff;margin-bottom:26px;position:relative;overflow:hidden;background-image:linear-gradient(135deg,rgba(232,97,26,.14),transparent 55%)}
.shead .eyebrow{font-family:'DM Mono';font-size:11px;letter-spacing:3px;color:var(--orange);text-transform:uppercase}

.shead .right{position:absolute;top:26px;right:28px;text-align:right}
.shead .big{font-family:'Bebas Neue';font-size:54px;line-height:.9;color:var(--orange)}
.shead .sub{font-size:11px;color:var(--slate);letter-spacing:1px;text-transform:uppercase}

.bar{height:100%;background:linear-gradient(90deg,var(--orange),#ff8c5a);border-radius:6px;transition:width .5s}
.elapsed{margin-top:8px;font-size:11px;color:var(--slate);letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:18px 20px;transition:.18s}
.card:hover{box-shadow:0 8px 24px rgba(13,27,42,.09);transform:translateY(-2px)}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card h3{font-family:'Bebas Neue';font-size:23px;letter-spacing:1px;line-height:1}
.card .meta{font-size:11px;color:#64748b;margin-top:3px}
.chip{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:5px;white-space:nowrap}
.t-wtn{background:rgba(232,97,26,.13);color:var(--orange2)}.t-gf{background:rgba(74,85,104,.14);color:var(--rpt)}
.cbar{margin-top:14px;height:7px;background:var(--light);border-radius:5px;overflow:hidden}
.cbar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#ff8c5a);border-radius:5px;transition:width .4s}
.card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.count{font-family:'DM Mono';font-size:13px;color:var(--navy);font-weight:500}
.pace{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 9px;border-radius:20px}
.p-ontrack{background:rgba(27,140,90,.14);color:var(--green)}.p-behind{background:rgba(194,138,0,.16);color:var(--yellow)}
.p-complete{background:var(--green);color:#fff}.p-incomplete{background:rgba(192,57,43,.14);color:var(--red)}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border:1px solid var(--border);border-radius:11px}
.tbl{width:100%;min-width:560px;border-collapse:separate;border-spacing:0;background:#fff;font-size:13px}
.tbl th{background:var(--navy);color:#fff;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:11px 8px;text-align:center}
.tbl td{padding:9px 8px;text-align:center;border-top:1px solid var(--border)}
.tbl td.wkc{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;background:var(--navy2);color:#fff}
.tbl td.dt{color:#64748b;font-family:'DM Mono';font-size:12px}.tbl td.cyc{font-size:11px;font-weight:600;color:var(--rpt)}
.scell{color:#fff;font-weight:700;font-size:11px;letter-spacing:.5px;border-radius:5px;padding:5px 0;display:block}
.s-BLOG{background:var(--blog)}.s-AMP{background:var(--amp)}.s-SEO{background:var(--seo)}.s-RPT{background:var(--rpt)}
.gaterow td{background:rgba(107,78,158,.1);color:var(--kick);font-weight:600;font-style:italic}
.gatebar{margin-top:14px;background:var(--navy);color:#fff;border-radius:10px;padding:15px 20px;text-align:center;font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px}.gatebar span{color:var(--orange)}
.acc{background:#fff;border:1px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.acc-h{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 20px;cursor:pointer;background:linear-gradient(90deg,var(--orange),var(--orange2));color:#fff}
.acc-h h3{font-family:'Bebas Neue';font-size:21px;letter-spacing:1px}.acc-h .r{display:flex;align-items:center;gap:14px}
.acc-h .ct{font-family:'DM Mono';font-size:13px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px}
.acc-h .car{transition:.25s;font-size:13px}.acc.open .acc-h .car{transform:rotate(180deg)}
.acc-b{display:none;padding:6px 0}.acc.open .acc-b{display:block}
.phase{font-family:'DM Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;padding:12px 20px 5px}
.trow{display:grid;grid-template-columns:58px 1fr 38px;gap:12px;align-items:center;padding:10px 20px;border-top:1px solid var(--light)}
.trow:hover{background:var(--light)}
.sstg{font-size:9px;font-weight:700;color:#fff;text-align:center;border-radius:4px;padding:4px 0;letter-spacing:.5px}
.s-Kickoff{background:var(--kick)}.s-Gate{background:var(--gate)}
.tmid{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;min-width:0}
.ttask{font-size:13px}.tmeta{font-family:'DM Mono';font-size:11px;color:#64748b;white-space:nowrap}
.ownsel{font-family:'DM Sans';font-size:11px;font-weight:600;color:var(--rpt);background:var(--light);border:1px solid var(--border);border-radius:6px;padding:4px 6px;max-width:104px;cursor:pointer}
.ownsel:hover{border-color:var(--orange)}
.gmeta{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;min-width:0}
.gcode{font-family:'DM Mono';font-size:11px;color:#94a3b8;font-weight:500}.gtext{font-size:13px}
.grow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:11px 20px;border-top:1px solid var(--light)}

.kwrow{display:grid;grid-template-columns:30px 1fr 1.2fr 30px;gap:8px;align-items:center;padding:8px 20px;border-top:1px solid var(--light)}

.kwstar:hover{color:var(--orange)}.kwstar.on{color:var(--orange)}

.kwaddbtn:hover{background:var(--orange2)}
.kwempty{padding:14px 20px;font-size:12px;color:#94a3b8;font-style:italic}
.trow.done .ttask{text-decoration:line-through;color:#94a3b8}

.cb:hover{border-color:var(--orange)}.cb.on{background:var(--green);border-color:var(--green);color:#fff;font-size:13px;font-weight:700}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}

.btn{font-family:'DM Sans';font-weight:600;font-size:12px;letter-spacing:.5px;background:#fff;border:1px solid var(--border);color:var(--rpt);padding:9px 16px;border-radius:7px;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--orange);color:var(--orange)}

.lg{font-size:10px;font-weight:700;color:#fff;padding:4px 10px;border-radius:5px;letter-spacing:.5px}

}

 if(bad>0)return['Fail','g-fail','gd-fail'];if(uns>0)return['Incomplete','g-inc','gd-inc'];return['Pass','g-pass','gd-pass'];}
function gateBtnsInner(slug,c){const v=gVal(slug,c);
 return `<button class="gb gy ${v==='Y'?'on':''}" onclick="setGate('${slug}','${c}','Y')">Yes</button>`+
        `<button class="gb gn ${v==='N'?'on':''}" onclick="setGate('${slug}','${c}','N')">No</button>`+
        `<button class="gb gna ${v==='NA'?'on':''}" onclick="setGate('${slug}','${c}','NA')">N/A</button>`;}
function paintGateItem(slug,c){const el=document.getElementById('g-'+slug+'-'+c);if(el)el.innerHTML=gateBtnsInner(slug,c);}
function updateGateHeader(slug){const el=document.getElementById('gh-'+slug);if(!el)return;const [lbl,pc]=gateStat(slug);el.className='gpill '+pc;el.textContent=gateYes(slug)+'/10 · '+lbl;}
async function setGate(slug,c,val){const key=slug+'|'+c,cur=gate[key]||'',nv=(cur===val)?'':val,had=gate.hasOwnProperty(key),prev=gate[key];
 if(nv)gate[key]=nv;else delete gate[key];paintGateItem(slug,c);updateGateHeader(slug);renderDash();
 if(MODE==='cloud'){try{const r=await fetch(API+'/gate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:key,val:nv,by:me})});if(!r.ok)throw 0;}
  catch(e){if(had)gate[key]=prev;else delete gate[key];paintGateItem(slug,c);updateGateHeader(slug);renderDash();alert('Could not reach the server — gate score not saved.');}}
 else localSave();}
const isDone=id=>doneSet.has(id);
function totals(c){const t=c.tasks.length,d=c.tasks.filter(x=>isDone(x.id)).length;return{t,d,pct:t?d/t:0};}
function elapsed(){const s=new Date(DATA.start),g=new Date(DATA.gate),n=new Date();return Math.max(0,Math.min(1,((n-s)/86400000)/((g-s)/86400000)));}
function pace(c){const {pct}=totals(c),g=new Date(DATA.gate),n=new Date();
if(n>g)return pct>=1?["Complete","p-complete"]:["Incomplete","p-incomplete"];return pct>=elapsed()?["On Track","p-ontrack"]:["Behind","p-behind"];}
function tierChip(t){return t.startsWith('Win')?'<span class="chip t-wtn">WtN</span>':'<span class="chip t-gf">Get Found</span>';}
function slugv(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
async function boot(){
 if(!me){me=(prompt('Your name (so the team can see who completed what):')||'Team').trim()||'Team';localStorage.setItem('odm_user',me);}
 try{const r=await fetch(API+'/state',{cache:'no-store'});if(!r.ok)throw 0;const j=await r.json();
  MODE='cloud';doneSet=new Set(j.done.map(x=>x.id));j.done.forEach(x=>meta[x.id]={by:x.by,at:x.at});owners=j.owners||{};gate=j.gate||{};kw=j.keywords||{};}
 catch(e){MODE='local';localLoad();}
 loadRoster();Object.values(owners).forEach(o=>{if(o)roster.add(o);});
 setStatus();renderDash();renderCal();renderWork();renderGate();renderKw();if(MODE==='cloud')setInterval(poll,8000);}
function setStatus(){const el=document.getElementById('status');
 el.innerHTML=(MODE==='cloud'?'<span class="dot g"></span>Synced · ':'<span class="dot a"></span>Local only · ')+me;}
function changeUser(){const n=prompt('Your name:',me);if(n){me=n.trim()||me;localStorage.setItem('odm_user',me);setStatus();}}
async function toggle(id){const now=!doneSet.has(id);if(now)doneSet.add(id);else doneSet.delete(id);paintTask(id);refreshCounters();
 if(MODE==='cloud'){try{const r=await fetch(API+'/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,done:now,by:me})});if(!r.ok)throw 0;
   if(now)meta[id]={by:me,at:new Date().toISOString()};else delete meta[id];}
  catch(e){if(now)doneSet.delete(id);else doneSet.add(id);paintTask(id);refreshCounters();alert('Could not reach the server — your change was not saved.');}}
 else localSave();}
async function poll(){try{const r=await fetch(API+'/state',{cache:'no-store'});if(!r.ok)return;const j=await r.json();
 const ns=new Set(j.done.map(x=>x.id));const no=j.owners||{};const ng=j.gate||{};let dch=false;
 DATA.clients.forEach(c=>c.tasks.forEach(t=>{if(doneSet.has(t.id)!==ns.has(t.id))dch=true;}));
 const och=JSON.stringify(no)!==JSON.stringify(owners);const gch=JSON.stringify(ng)!==JSON.stringify(gate);
 const nk=j.keywords||{};const kch=JSON.stringify(nk)!==JSON.stringify(kw);
 if(!dch&&!och&&!gch&&!kch)return;
 doneSet=ns;meta={};j.done.forEach(x=>meta[x.id]={by:x.by,at:x.at});owners=no;gate=ng;
 Object.values(owners).forEach(o=>{if(o)roster.add(o);});
 DATA.clients.forEach(c=>c.tasks.forEach(t=>{paintTask(t.id);setOwnerVal(t.id);}));
 if(gch)DATA.clients.forEach(c=>{const slug=slugv(c.name);GATE_ITEMS.forEach(([code])=>paintGateItem(slug,code));updateGateHeader(slug);});
 if(kch){kw=nk;const ae=document.activeElement;const typing=ae&&(ae.classList.contains('kwin')||ae.classList.contains('kwnote'));
  if(!typing)DATA.clients.forEach(c=>rerenderKwList(slugv(c.name)));}
 if(dch||gch)refreshCounters();}catch(e){}}
function paintTask(id){const row=document.getElementById('row-'+id);if(!row)return;const cb=row.querySelector('.cb');
 if(doneSet.has(id)){row.classList.add('done');cb.classList.add('on');cb.textContent='✓';if(meta[id]&&meta[id].by)row.title='Done by '+meta[id].by;}
 else{row.classList.remove('done');cb.classList.remove('on');cb.textContent='';row.removeAttribute('title');}}
function refreshCounters(){renderDash();DATA.clients.forEach(c=>{const el=document.getElementById('ct-'+slugv(c.name));if(el){const {t,d}=totals(c);el.textContent=d+' / '+t+' done';}});}
function renderDash(){let g=DATA.clients.reduce((a,c)=>{const t=totals(c);a.t+=t.t;a.d+=t.d;return a;},{t:0,d:0});
 const gp=g.t?Math.round(g.d/g.t*100):0,ep=Math.round(elapsed()*100);
 let cards=DATA.clients.map(c=>{const {t,d,pct}=totals(c);const [pl,pc]=pace(c);const slug=slugv(c.name);const [glbl,,gdc]=gateStat(slug);const gy=gateYes(slug);
  return `<div class="card"><div class="top"><div><h3>${c.name}</h3><div class="meta">Cohort ${c.cohort} · ${c.vert}</div></div>${tierChip(c.tier)}</div>
  <div class="cbar"><i style="width:${Math.round(pct*100)}%"></i></div>
  <div class="foot"><span class="count">${d} / ${t} tasks</span><span class="pace ${pc}">${pl}</span></div>
  <div class="gateline"><span class="gdot ${gdc}"></span>Gate ${gy}/10 · ${glbl}</div></div>`;}).join('');
 document.getElementById('dash').innerHTML=`<div class="shead"><div class="eyebrow">Q Sprint 1 · 90 Days</div><h1>Sprint Tracker</h1>
  <div class="dates">Jun 1 – Aug 31, 2026 · Day-90 gate decides renew vs churn</div>
  <div class="right"><div class="big">${gp}%</div><div class="sub">${g.d}/${g.t} done</div></div>
  <div class="barwrap"><div class="bar" style="width:${gp}%"></div></div>
  <div class="elapsed">Sprint elapsed: ${ep}% · pace flags clients tracking below time elapsed</div></div>
  <div class="toolbar"><h2>Clients</h2><button class="btn" onclick="resetAll()">Reset sprint</button></div>
  <div class="grid">${cards}</div>`;}
function renderCal(){let rows=DATA.calendar.map(r=>{if(r.gate)return `<tr class="gaterow"><td class="wkc">Wk ${r.wk}</td><td class="dt">${r.date}</td><td class="cyc">${r.cycle}</td><td colspan="4">Gate prep / catch-up — close out open tasks</td></tr>`;
  return `<tr><td class="wkc">Wk ${r.wk}</td><td class="dt">${r.date}</td><td class="cyc">${r.cycle}</td>
  <td><span class="scell s-${r.A}">${r.A}</span></td><td><span class="scell s-${r.B}">${r.B}</span></td>
  <td><span class="scell s-${r.C}">${r.C}</span></td><td><span class="scell s-${r.D}">${r.D}</span></td></tr>`;}).join('');
 document.getElementById('cal').innerHTML=`<div class="toolbar"><h2>Sprint Calendar</h2></div>
  <div class="legend"><span class="lg s-BLOG">BLOG</span><span class="lg s-AMP">AMP</span><span class="lg s-SEO">SEO</span><span class="lg s-RPT">RPT</span></div>
  <div class="tblwrap"><table class="tbl"><tr><th>Wk</th><th>Week Of</th><th>Cycle</th><th>Cohort A</th><th>Cohort B</th><th>Cohort C</th><th>Cohort D</th></tr>${rows}</table></div>
  <div class="gatebar">AUG 31 · <span>DAY-90 GATE REVIEW</span> — score all 7 clients on the 10-item retention benchmark</div>`;}
function renderWork(){let acc=DATA.clients.map((c,ci)=>{const {t,d}=totals(c);let last='';
  let body=c.tasks.map(x=>{let ph=x.phase!==last?`<div class="phase">${x.phase}</div>`:'';last=x.phase;
   return ph+`<div class="trow ${isDone(x.id)?'done':''}" id="row-${x.id}"><span class="sstg s-${x.stage}">${x.stage}</span>
   <div class="tmid"><span class="ttask">${x.task}</span><span class="tmeta">Wk ${x.wk} · ${x.date}</span><select class="ownsel" id="own-${x.id}" onclick="event.stopPropagation()" onchange="assignOwner('${x.id}',this)">${ownerOptions(effectiveOwner(x.id))}</select></div>
   <div class="cb ${isDone(x.id)?'on':''}" onclick="toggle('${x.id}')">${isDone(x.id)?'✓':''}</div></div>`;}).join('');
  return `<div class="acc ${ci===0?'open':''}" id="acc-${ci}"><div class="acc-h" onclick="document.getElementById('acc-${ci}').classList.toggle('open')">
   <h3>${c.name}</h3><div class="r"><span class="ct" id="ct-${slugv(c.name)}">${d} / ${t} done</span><span class="car">▼</span></div></div>
   <div class="acc-b">${body}</div></div>`;}).join('');
 document.getElementById('work').innerHTML=`<div class="toolbar"><h2>Client Workload</h2><button class="btn" onclick="resetAll()">Reset sprint</button></div>${acc}`;}
function kwOf(slug){return Object.keys(kw).filter(id=>kw[id].client===slug).map(id=>({id,...kw[id]}));}
function kwRowHtml(o){return `<div class="kwrow" id="kwrow-${o.id}">
 <button class="kwstar ${o.primary?'on':''}" id="kwstar-${o.id}" onclick="kwTogglePrimary('${o.id}')" title="Mark as primary keyword">★</button>
 <input class="kwin" value="${esc(o.kw||'')}" onchange="kwUpdate('${o.id}','kw',this.value)" placeholder="keyword">
 <input class="kwnote" value="${esc(o.note||'')}" onchange="kwUpdate('${o.id}','note',this.value)" placeholder="target page / current rank / city">
 <button class="kwdel" onclick="kwDelete('${o.id}')" title="Remove">✕</button></div>`;}
function kwListHtml(slug){const items=kwOf(slug).sort((a,b)=>(b.primary||0)-(a.primary||0));
 const rows=items.length?items.map(kwRowHtml).join(''):'<div class="kwempty">No keywords yet — add your focus terms below.</div>';
 return rows+`<div class="kwadd"><input id="kwnew-${slug}" class="kwin" placeholder="Add a keyword…" onkeydown="if(event.key==='Enter'){event.preventDefault();kwAdd('${slug}')}"><button class="kwaddbtn" onclick="kwAdd('${slug}')">Add</button></div>`;}
function refreshKwCount(slug){const el=document.getElementById('kwct-'+slug);if(el){const n=kwOf(slug).length;el.textContent=n+' keyword'+(n===1?'':'s');}}
function rerenderKwList(slug){const el=document.getElementById('kwlist-'+slug);if(el)el.innerHTML=kwListHtml(slug);refreshKwCount(slug);}
function renderKw(){let acc=DATA.clients.map((c,ci)=>{const slug=slugv(c.name);const n=kwOf(slug).length;
  return `<div class="acc ${ci===0?'open':''}" id="kacc-${ci}"><div class="acc-h" onclick="document.getElementById('kacc-${ci}').classList.toggle('open')">
   <h3>${c.name}</h3><div class="r"><span class="ct" id="kwct-${slug}">${n} keyword${n===1?'':'s'}</span><span class="car">▼</span></div></div>
   <div class="acc-b" style="padding:8px 0"><div id="kwlist-${slug}">${kwListHtml(slug)}</div></div></div>`;}).join('');
 document.getElementById('kw').innerHTML=`<div class="toolbar"><h2>Focus Keywords</h2></div>
  <div class="gatenote">The keyword bank each client's content is built around — pull from here when the team hits the <b>Select keyword / topic</b> task each cycle. Star your <b>primary</b> terms; those are what the gate's Map Pack item (G3-05) is scored against. The note field is for target page, current rank, or city.</div>${acc}`;}
async function kwPush(op,o){if(MODE==='cloud'){try{const r=await fetch(API+'/keyword',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({op,...o,by:me})});if(!r.ok)throw 0;return true;}catch(e){alert('Could not reach the server — keyword change not saved.');return false;}}else{localSave();return true;}}
async function kwAdd(slug){const inp=document.getElementById('kwnew-'+slug);const v=(inp.value||'').trim();if(!v)return;
 const id=slug+'-kw-'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
 kw[id]={client:slug,kw:v,note:'',primary:0};inp.value='';rerenderKwList(slug);
 const ok=await kwPush('add',{id,client:slug,kw:v,note:'',primary:0});if(!ok){delete kw[id];rerenderKwList(slug);}else{const ni=document.getElementById('kwnew-'+slug);if(ni)ni.focus();}}
async function kwUpdate(id,field,val){if(!kw[id])return;const prev=kw[id][field];kw[id][field]=val;
 const ok=await kwPush('update',{id,client:kw[id].client,kw:kw[id].kw,note:kw[id].note,primary:kw[id].primary});if(!ok)kw[id][field]=prev;}
async function kwTogglePrimary(id){if(!kw[id])return;const nv=kw[id].primary?0:1;kw[id].primary=nv;
 const b=document.getElementById('kwstar-'+id);if(b)b.classList.toggle('on',!!nv);
 const ok=await kwPush('update',{id,client:kw[id].client,kw:kw[id].kw,note:kw[id].note,primary:nv});if(!ok){kw[id].primary=nv?0:1;if(b)b.classList.toggle('on',!!kw[id].primary);}}
async function kwDelete(id){if(!kw[id])return;const slug=kw[id].client,bak=kw[id];delete kw[id];rerenderKwList(slug);
 const ok=await kwPush('delete',{id,client:slug});if(!ok){kw[id]=bak;rerenderKwList(slug);}}
function renderGate(){let acc=DATA.clients.map((c,ci)=>{const slug=slugv(c.name);const [lbl,pc]=gateStat(slug);
  let rows=GATE_ITEMS.map(([code,text])=>`<div class="grow"><div class="gmeta"><span class="gcode">${code}</span><span class="gtext">${text}</span></div><div class="gbtns" id="g-${slug}-${code}">${gateBtnsInner(slug,code)}</div></div>`).join('');
  return `<div class="acc" id="gacc-${ci}"><div class="acc-h" onclick="document.getElementById('gacc-${ci}').classList.toggle('open')">
   <h3>${c.name}</h3><div class="r"><span class="gpill ${pc}" id="gh-${slug}">${gateYes(slug)}/10 · ${lbl}</span><span class="car">▼</span></div></div>
   <div class="acc-b">${rows}</div></div>`;}).join('');
 document.getElementById('gate').innerHTML=`<div class="toolbar"><h2>Day-90 Retention Gate</h2></div>
  <div class="gatenote">All 10 items must land on <b>Yes</b> (or N/A) to PASS — a single <b>No</b> fails the gate. Score each client at the Aug 31 review. A fail isn't a churn call — it's the Month 4 priority plan built around the No items.</div>${acc}`;}
async function resetAll(){if(!confirm('Clear all task progress and gate scores for a fresh sprint? Owner assignments and keywords are kept.'))return;
 if(MODE==='cloud'){try{await fetch(API+'/reset',{method:'POST'});}catch(e){alert('Could not reach server.');return;}}
 doneSet=new Set();meta={};gate={};if(MODE==='local')localSave();
 renderDash();renderWork();DATA.clients.forEach(c=>{const slug=slugv(c.name);GATE_ITEMS.forEach(([code])=>paintGateItem(slug,code));updateGateHeader(slug);});}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(b.dataset.p).classList.add('on');});
boot();
</script></body></html>
